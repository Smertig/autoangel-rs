<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Elements Viewer</title>
  <link rel="stylesheet" href="../nav.css">
  <link rel="stylesheet" href="elements.css">
</head>
<body>
  <nav class="demo-nav">
    <a href="../" class="demo-nav-home">autoangel</a>
    <div class="demo-nav-links">
      <a href="../elements/" class="demo-nav-link active">Elements</a>
      <a href="../pck/" class="demo-nav-link">PCK</a>
      <a href="../pck-diff/" class="demo-nav-link">Diff</a>
    </div>
  </nav>
  <script>if(location.search)document.querySelectorAll('.demo-nav a').forEach(a=>{if(!a.href.includes('?'))a.href+=location.search})</script>
  <div id="app">
    <header id="header">
      <div id="drop" class="drop-zone">
        <span class="drop-label">Drop an <code>elements.data</code> file here, or</span>
        <input type="file" id="picker" accept=".data">
      </div>
      <div id="status">Loading WASM&hellip;</div>
      <button id="config-toggle" class="config-toggle" title="Use a custom config file">
        <svg viewBox="0 0 20 20" width="14" height="14" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <path d="M10 13a3 3 0 1 0 0-6 3 3 0 0 0 0 6z"/>
          <path d="M16.5 10a1.5 1.5 0 0 0 .3-1.65l-.75-1.3a1.5 1.5 0 0 0-1.65-.68l-.36.08a7 7 0 0 0-1.04-.6V5.5A1.5 1.5 0 0 0 11.65 4h-1.5a1.5 1.5 0 0 0-1.35.85v.36a7 7 0 0 0-1.04.6l-.36-.08a1.5 1.5 0 0 0-1.65.68l-.75 1.3A1.5 1.5 0 0 0 5.3 9.36l.28.24a7 7 0 0 0 0 1.2l-.28.24a1.5 1.5 0 0 0-.3 1.65l.75 1.3a1.5 1.5 0 0 0 1.65.68l.36-.08a7 7 0 0 0 1.04.6v.36a1.5 1.5 0 0 0 1.35.85h1.5a1.5 1.5 0 0 0 1.35-.85v-.36a7 7 0 0 0 1.04-.6l.36.08a1.5 1.5 0 0 0 1.65-.68l.75-1.3a1.5 1.5 0 0 0-.3-1.65l-.28-.24a7 7 0 0 0 0-1.2z"/>
        </svg>
        <span>Config</span>
      </button>
      <a href="https://github.com/Smertig/autoangel-rs/tree/master/demos/elements" target="_blank" rel="noopener" class="source-link" title="View source on GitHub">
        <svg viewBox="0 0 16 16" width="16" height="16" fill="currentColor"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/></svg>
        <span>Source</span>
      </a>
    </header>
    <div id="error-banner" class="hidden"></div>

    <div id="config-panel" class="config-panel hidden">
      <div class="config-body">
        <div class="config-left">
          <textarea id="config-text" spellcheck="false" placeholder="Paste a .cfg config here&#10;&#10;Example format:&#10;2&#10;0&#10;&#10;001 - Weapons&#10;AUTO&#10;ID;Name;Level&#10;int32;wstring:64;int32&#10;&#10;002 - Armor&#10;AUTO&#10;ID;Name&#10;int32;wstring:64"></textarea>
        </div>
        <div class="config-right">
          <div class="config-info" id="config-info">No custom config applied. The viewer auto-detects a bundled config from the data file version.</div>
          <div class="config-error hidden" id="config-error"></div>
          <label class="btn btn-file">
            Load .cfg file
            <input type="file" id="config-picker" accept=".cfg,.txt" hidden>
          </label>
          <div class="config-actions">
            <button id="config-apply" class="btn btn-apply">Apply</button>
            <button id="config-clear" class="btn btn-clear" disabled>Clear</button>
          </div>
        </div>
      </div>
    </div>

    <main id="explorer" class="hidden">
      <aside id="lists-panel">
        <div class="panel-header">
          <input type="text" id="list-filter" placeholder="Filter lists&hellip;">
        </div>
        <div id="lists-content"></div>
      </aside>
      <div id="divider1" class="divider"></div>
      <section id="entries-panel">
        <div class="panel-header">
          <span id="entries-title">Entries</span>
          <input type="text" id="entry-search" placeholder="Search ID or Name&hellip;">
        </div>
        <div id="entries-content"></div>
      </section>
      <div id="divider2" class="divider"></div>
      <section id="detail-panel">
        <div class="panel-header">
          <span id="detail-title">Detail</span>
        </div>
        <div id="detail-content">
          <div class="placeholder">Select an entry to view details</div>
        </div>
      </section>
    </main>

    <footer id="statusbar" class="hidden">
      <span id="info-lists"></span>
      <span id="info-version"></span>
      <span id="info-entries"></span>
    </footer>
  </div>

  <script type="module" src="elements.js"></script>
</body>
</html>
