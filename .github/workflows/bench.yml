name: Benchmarks on commit
on:
  push:
    branches:
      - master
    paths:
      - 'autoangel-core/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - '.github/workflows/bench.yml'

permissions:
  contents: write
  deployments: write

jobs:
  benchmark:
    name: Run benchmarks
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Run time benchmarks
        run: set -o pipefail && cd autoangel-core && cargo bench --bench elements --bench pck -- --output-format bencher --sample-size 10 --measurement-time 3 | tee time_output.txt

      - name: Run memory benchmarks
        run: set -o pipefail && cd autoangel-core && cargo bench --bench elements_mem --bench pck_mem | tee mem_output.txt

      - name: Store time benchmark result
        uses: benchmark-action/github-action-benchmark@v1.21.0
        with:
          name: Rust Benchmark (Time)
          tool: 'cargo'
          output-file-path: autoangel-core/time_output.txt
          github-token: ${{ secrets.GITHUB_TOKEN }}
          auto-push: false

      - name: Store memory benchmark result
        uses: benchmark-action/github-action-benchmark@v1.21.0
        with:
          name: Rust Benchmark (Memory)
          tool: 'cargo'
          output-file-path: autoangel-core/mem_output.txt
          github-token: ${{ secrets.GITHUB_TOKEN }}
          auto-push: true
          skip-fetch-gh-pages: true
